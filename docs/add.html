  <h2 style="margin-top:0">Add a board game library</h2>
  <p>A friend shared their Tabletop Tracker collection with you.</p>

  <p style="margin:1rem 0">Share code</p>
  <p id="code" style="font-size:2rem;font-weight:800;letter-spacing:4px;margin:0 0 1.5rem">——————</p>

  <p><a id="open" href="#" style="display:inline-block;background:#534ab7;color:#fff;text-decoration:none;padding:0.8rem 1.5rem;border-radius:8px;font-weight:600">Open in Tabletop Tracker</a></p>

  <p style="font-size:0.9rem;color:#666;margin-top:1.5rem">
    Don't have the app yet?
    <a id="store" href="https://play.google.com/store/apps/details?id=com.bgk.boardgamekeeper">Get it on Google&nbsp;Play</a>,
    then open the app, go to the Library tab, and enter the code above.
  </p>
</div>

<script>
  (function () {
    var params = new URLSearchParams(window.location.search);
    var code = (params.get('code') || '').trim().toUpperCase();
    if (code) {
      document.getElementById('code').textContent = code;
      document.getElementById('open').setAttribute('href', 'tabletoptracker://library/' + encodeURIComponent(code));
    } else {
      document.getElementById('open').style.display = 'none';
    }
  })();
</script>
